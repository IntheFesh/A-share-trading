# config/exit.yaml — 出场参数:硬止损、止盈阶梯、跟踪系数 c、最大持有 H、连续跌停 K
# 对应 v3.1 第十一章出场状态机。出场优先级(代码按序判定):
#   硬止损 > 事件止损(含披露季 veto) > 止盈 > 模型轮动/时间止损

atr:
  n_period: 14                 # ATR 周期(N)  # TODO: Phase 2 自验

# 硬止损:2.5N(止损触发当日收盘确认,次开执行;跳空按次开实际价记账,实际亏损可 > 2.5N)
hard_stop:
  atr_mult: 2.5                # 2.5N

# 止盈阶梯:分批 + 跟踪(+ 可选目标价)
take_profit:
  ladder:
    - { at_R: 1.0, reduce_fraction: 0.3333 }                       # +1R 减 1/3
    - { at_R: 2.0, reduce_fraction: 0.3333, move_stop_to_cost: true } # +2R 再减 1/3,余仓止损移成本
  trailing:
    coef_c: 2.5                # 跟踪止损系数 c ∈ [2, 3]:stop = max(最高收盘) - c*N  # TODO: Phase 2 自验
  target_price:
    enabled: false             # 可选目标价  # TODO: Phase 2 自验

# 时间止损 / 最大持有
time_stop:
  max_holding_days: 10         # 最大持有 H(=H_max,与 embargo 关联)  # TODO: Phase 2 自验

# 跌停顺延 / 停牌顺延相关
delay:
  k_limitdown: 2               # 连续跌停顺延上限 K(与 risk.yaml 的 k 一致)
